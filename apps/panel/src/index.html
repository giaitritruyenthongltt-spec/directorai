<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DirectorAI</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --surface: #2d2d2d;
      --border: #3a3a3a;
      --accent: #5b9bd5;
      --accent-hover: #4a85c0;
      --text: #d4d4d4;
      --text-dim: #888;
      --success: #4caf50;
      --error: #f44336;
      --warn: #ff9800;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif,
        'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji', 'Apple Color Emoji';
      font-size: 13px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
