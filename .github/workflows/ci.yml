name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: SDK surface diff (P5.01e)
        run: pnpm sdk:surface

  python-checks:
    name: Python checks (context-engine)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: apps/context-engine
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
      - name: Setup Python
        run: uv python install 3.11
      - name: Install ffmpeg (probe/concat tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: uv sync
      - name: Ruff lint (src + tests)
        run: uv run ruff check src tests
      - name: Pytest (131 tests, dữ liệu tổng hợp — không cần media thật)
        run: uv run pytest -q
